{% extends "layout.html" %}

{% block title %}Logged Out - Tweetbar{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in" style="min-height: 60vh; align-items: center;">
    <div class="col-md-6 col-lg-5">
        <div class="tweet-card p-5 text-center">
            <div class="bg-success bg-opacity-10 text-success rounded-circle d-inline-flex align-items-center justify-content-center mb-4" style="width: 80px; height: 80px;">
                <svg width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            
            <h2 class="fw-bold mb-3">Logged Out Successfully</h2>
            <p class="text-muted mb-5">You have been securely logged out. See you soon!</p>
            
            <div class="d-grid gap-3">
                <a href="{% url 'login' %}" class="btn btn-primary-custom py-3 fw-bold">
                    Login Again
                </a>
                <a href="{% url 'index' %}" class="btn btn-outline-light py-3 fw-bold">
                    Return Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
