{% extends 'layout.html' %}

{% block title %}Confirm Delete | Tweetbar{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-6 col-lg-5">
        <div class="tweet-card p-5 text-center">
            <div class="bg-danger bg-opacity-10 text-danger rounded-circle d-inline-flex align-items-center justify-content-center mb-4" style="width: 80px; height: 80px;">
                <svg width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                </svg>
            </div>
            
            <h2 class="fw-bold mb-3">Delete Tweet?</h2>
            <p class="text-muted mb-5">This action cannot be undone. Are you sure you want to permanently delete this tweet?</p>
            
            <form method="post" class="d-grid gap-3">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger py-3 fw-bold rounded-4 shadow-sm">
                    Yes, Delete Tweet
                </button>
                <a href="{% url 'tweet_list' %}" class="btn btn-outline-light py-3 fw-bold rounded-4 border-2">
                    No, Go Back
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
