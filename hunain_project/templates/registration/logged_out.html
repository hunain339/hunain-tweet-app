{% extends "layout.html" %}

{% block title %}Logout - Tweetbar{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4 text-center">
        <div class="card bg-secondary text-light shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <h3 class="fw-bold" style="color:#ff6a00;">Logged Out</h3>
                <p class="mt-3 text-light opacity-75">You have been successfully logged out.</p>
                <div class="mt-4 pt-3 border-top border-secondary">
                    <a href="{% url 'login' %}" class="btn fw-bold w-100 mb-2" style="background-color:#ff6a00; color:#212529;">Login Again</a>
                    <a href="{% url 'index' %}" class="btn btn-outline-light w-100">Return Home</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
